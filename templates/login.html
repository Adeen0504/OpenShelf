<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login — OpenShelf</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root { --cream:#faf7f2; --ink:#1a1207; --warm:#8b5e3c; --gold:#c9963a; }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh;
      background: var(--ink);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Source Sans 3', sans-serif;
    }
    .card {
      background: var(--cream); border-radius: 12px;
      padding: 2.5rem 2rem; width: 100%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,.4);
    }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--ink); margin-bottom: .25rem; }
    .subtitle { font-size: .85rem; color: #7a6a58; margin-bottom: 2rem; }
    label { display: block; font-size: .83rem; font-weight: 600; color: var(--ink); margin-bottom: .35rem; letter-spacing: .3px; }
    input[type="text"], input[type="password"] {
      width: 100%; padding: .65rem 1rem; border: 1.5px solid #ddd;
      border-radius: 6px; font-family: inherit; font-size: .95rem; color: var(--ink);
      background: #fff; outline: none; transition: border-color .2s;
      margin-bottom: 1.2rem;
    }
    input:focus { border-color: var(--warm); }
    .remember { display: flex; align-items: center; gap: .5rem; margin-bottom: 1.5rem; }
    .remember input { width: auto; margin: 0; }
    .remember label { margin: 0; font-weight: 400; font-size: .85rem; }
    .btn-submit {
      width: 100%; padding: .75rem;
      background: var(--ink); color: var(--cream);
      border: none; border-radius: 6px; font-size: 1rem; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: background .2s;
    }
    .btn-submit:hover { background: var(--warm); }
    .error { background: #fde8e8; color: #c0392b; border-radius: 6px; padding: .6rem 1rem; font-size: .88rem; margin-bottom: 1rem; }
    .footer-link { text-align: center; margin-top: 1.2rem; font-size: .85rem; color: #7a6a58; }
    .footer-link a { color: var(--warm); font-weight: 600; text-decoration: none; }
    .back-link { text-align: center; margin-top: .5rem; font-size: .82rem; }
    .back-link a { color: #aaa; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">OpenShelf</div>
    <p class="subtitle">Welcome back — login to your library</p>

    {% if msg %}
    <div class="error">{{ msg }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('login') }}">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autocomplete="username">

      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password">

      <div class="remember">
        <input type="checkbox" id="remember" name="remember" value="yes">
        <label for="remember">Remember me for 30 days</label>
      </div>

      <button type="submit" class="btn-submit">Login</button>
    </form>

    <p class="footer-link">Don't have an account? <a href="{{ url_for('register') }}">Sign up</a></p>
    <p class="back-link"><a href="{{ url_for('first') }}">← Back to home</a></p>
  </div>
</body>
</html>
